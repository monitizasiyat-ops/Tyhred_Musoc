<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tyhred</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Figtree:wght@300;400;500;600;700&display=swap');
        body { 
            font-family: 'Figtree', sans-serif; 
            background: #000; 
            color: #fff; 
            overflow: hidden; 
            height: 100vh; 
            margin: 0; 
        }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: #444; border-radius: 3px; }
        .card { 
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); 
            background: #181818; 
        }
        .card:hover { 
            transform: translateY(-8px) scale(1.05); 
            background: #282828; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.6); 
        }
        .float-play { 
            opacity: 0; 
            transform: translateY(30px) scale(0.7); 
            transition: all 0.45s ease-out; 
        }
        .card:hover .float-play { 
            opacity: 1; 
            transform: translateY(0) scale(1); 
        }
        .active-track { 
            background: linear-gradient(to right, rgba(30,215,96,0.15), transparent) !important; 
        }
        .progress-bar { 
            height: 4px; 
            background: #535353; 
            border-radius: 2px; 
            transition: all 0.2s; 
        }
        .progress-bar:hover { 
            height: 8px; 
        }
        .now-playing-bar { 
            background: linear-gradient(135deg, #121212, #1a1a1a); 
            border-top: 1px solid #282828; 
        }
    </style>
</head>
<body class="flex h-screen">

    <!-- Sidebar (Admin modu kaldırıldı) -->
    <aside class="w-72 bg-black p-6 flex flex-col gap-8 border-r border-zinc-900">
        <div class="flex items-center gap-4">
            <img src="https://via.placeholder.com/40?text=T" class="w-10 h-10 rounded-full shadow-lg" alt="Tyhred"/>
            <span class="text-3xl font-black tracking-tighter">Tyhred</span>
        </div>
        <nav class="space-y-6 text-zinc-300 text-lg">
            <div class="flex items-center gap-5 font-medium hover:text-white cursor-pointer transition"><i class="fas fa-home w-7"></i> Ana Sayfa</div>
            <div onclick="focusSearch()" class="flex items-center gap-5 font-medium hover:text-white cursor-pointer transition"><i class="fas fa-search w-7"></i> Ara</div>
            <div class="flex items-center gap-5 font-medium hover:text-white cursor-pointer transition"><i class="fas fa-book w-7"></i> Kitaplığın</div>
        </nav>
        <div class="mt-10">
            <div class="flex items-center justify-between text-sm text-zinc-400 mb-4 uppercase tracking-wider font-bold">
                <span>Çalma Listelerin</span>
                <i class="fas fa-plus hover:text-white cursor-pointer"></i>
            </div>
            <div id="playlist" class="space-y-4 text-sm overflow-y-auto max-h-64"></div>
        </div>
    </aside>

    <!-- Main -->
    <main class="flex-1 flex flex-col overflow-hidden">
        <header class="h-16 bg-black/80 backdrop-blur-xl flex items-center justify-between px-10 border-b border-zinc-800 z-20">
            <div class="flex items-center gap-6">
                <button class="w-10 h-10 bg-zinc-900 rounded-full flex items-center justify-center hover:bg-zinc-700 transition"><i class="fas fa-chevron-left"></i></button>
                <button class="w-10 h-10 bg-zinc-900 rounded-full flex items-center justify-center hover:bg-zinc-700 transition"><i class="fas fa-chevron-right"></i></button>
            </div>
            <input id="searchInput" type="text" placeholder="Ne dinlemek istiyorsun?" class="w-[500px] bg-zinc-800/70 px-6 py-3 rounded-full text-base focus:outline-none focus:ring-2 focus:ring-[#1ed760] transition" oninput="filterSongs()"/>
            <div class="flex items-center gap-8">
                <button class="bg-white text-black px-6 py-2 rounded-full text-sm font-bold hover:scale-105 transition shadow-md">Premium'a geç</button>
                <div class="w-10 h-10 bg-zinc-700 rounded-full overflow-hidden cursor-pointer shadow-md"><img src="https://i.pravatar.cc/150?img=68" alt="user"/></div>
            </div>
        </header>

        <section class="flex-1 overflow-y-auto bg-gradient-to-b from-zinc-950 via-black to-black p-10 pb-40">
            <h1 class="text-5xl font-black mb-12">Hoş Geldin</h1>

            <!-- Kartlar bölümü boş başlıyor -->
            <div class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 2xl:grid-cols-6 gap-8 mb-16" id="cards"></div>

            <!-- Tüm Şarkılar başlığı ve tablo (boş başlıyor) -->
            <h2 class="text-3xl font-bold mb-8">Tüm Şarkılar</h2>
            <table class="w-full text-left text-base">
                <thead class="text-zinc-400 uppercase text-sm tracking-wider border-b border-zinc-800">
                    <tr><th class="py-5 w-12">#</th><th class="py-5">ŞARKI</th><th class="py-5 text-right"><i class="far fa-clock"></i></th></tr>
                </thead>
                <tbody id="tracks"></tbody>
            </table>
        </section>

        <!-- Modern Player Bar -->
        <footer class="now-playing-bar h-28 flex items-center px-10 fixed bottom-0 left-72 right-0 z-50 shadow-2xl">
            <div class="w-96 flex items-center gap-6">
                <img id="npCover" src="https://picsum.photos/100?random=20" class="w-16 h-16 rounded-xl shadow-2xl object-cover ring-1 ring-zinc-800"/>
                <div class="flex-1 min-w-0">
                    <div id="npTitle" class="font-bold text-lg truncate">Şarkı seç</div>
                </div>
                <i class="far fa-heart text-zinc-400 hover:text-white text-xl cursor-pointer transition"></i>
            </div>

            <div class="flex-1 flex flex-col items-center gap-3">
                <div class="flex items-center gap-10 text-zinc-300 text-3xl">
                    <i class="fas fa-random hover:text-white cursor-pointer transition text-2xl"></i>
                    <i class="fas fa-backward-step hover:text-white cursor-pointer transition" onclick="prevSong()"></i>
                    <button id="playPause" class="w-16 h-16 bg-white rounded-full flex items-center justify-center text-black hover:scale-110 shadow-2xl transition transform" onclick="togglePlay()">
                        <i class="fas fa-play text-3xl ml-1"></i>
                    </button>
                    <i class="fas fa-forward-step hover:text-white cursor-pointer transition" onclick="nextSong()"></i>
                    <i class="fas fa-repeat hover:text-white cursor-pointer transition text-2xl"></i>
                </div>
                <div class="w-full max-w-3xl flex items-center gap-4 text-sm text-zinc-500">
                    <span id="currentTime">0:00</span>
                    <div class="progress-bar flex-1 cursor-pointer relative group" onclick="seek(event)">
                        <div id="progress" class="h-full bg-[#1ed760] rounded-full w-0 transition-all duration-150"></div>
                    </div>
                    <span id="totalTime">0:00</span>
                </div>
            </div>

            <div class="w-96 flex justify-end items-center gap-8 text-zinc-400 text-xl">
                <i class="fas fa-microphone-alt hover:text-white cursor-pointer transition"></i>
                <i class="fas fa-list hover:text-white cursor-pointer transition"></i>
                <i class="fas fa-volume-up hover:text-white cursor-pointer transition"></i>
                <input type="range" id="volume" min="0" max="1" step="0.01" value="0.8" class="w-32 accent-[#1ed760] cursor-pointer"/>
            </div>
        </footer>
    </main>

<audio id="audio" crossorigin="anonymous"></audio>

<script>
// Tracks tamamen boş başlıyor – hiçbir şarkı yok
let tracks = localStorage.getItem('tyhredTracks') ? JSON.parse(localStorage.getItem('tyhredTracks')) : [];

let currentIndex = -1;
let audio = document.getElementById('audio');
let isPlaying = false;

function init() {
    renderAll();
}

function renderAll() {
    renderCards();
    renderTable();
    renderPlaylist();
}

function renderCards() {
    document.getElementById('cards').innerHTML = tracks.map((t, i) => `
        <div class="card p-5 rounded-2xl cursor-pointer relative group shadow-xl" onclick="playSong(${i})">
            <img src="${t.cover}" class="w-full aspect-square object-cover rounded-xl mb-5 shadow-2xl"/>
            <div class="float-play absolute bottom-28 right-8 w-14 h-14 bg-[#1ed760] rounded-full flex items-center justify-center shadow-2xl"><i class="fas fa-play text-black text-xl ml-1"></i></div>
            <div class="font-bold text-lg truncate">${t.title}</div>
        </div>
    `).join('');
}

function renderTable() {
    document.getElementById('tracks').innerHTML = tracks.map((t, i) => `
        <tr class="hover:bg-zinc-800/70 cursor-pointer transition group" onclick="playSong(${i})">
            <td class="py-5 px-5 group-hover:text-white">${i+1}</td>
            <td class="py-5 flex items-center gap-6">
                <img src="${t.cover}" class="w-12 h-12 rounded-xl object-cover shadow-md"/>
                <div class="font-medium text-lg">${t.title}</div>
            </td>
            <td class="py-5 text-right text-zinc-400 text-lg">${t.duration}</td>
        </tr>
    `).join('');
}

function renderPlaylist() {
    document.getElementById('playlist').innerHTML = tracks.map(t => `
        <div class="flex items-center gap-4 p-3 hover:bg-zinc-900 rounded-xl cursor-pointer transition">
            <img src="${t.cover}" class="w-12 h-12 rounded-xl object-cover"/>
            <div class="min-w-0">
                <div class="text-base truncate font-medium">${t.title}</div>
            </div>
        </div>
    `).join('');
}

function playSong(idx) {
    if (idx === currentIndex) return togglePlay();
    currentIndex = idx;
    const song = tracks[idx];
    audio.src = song.url;
    document.getElementById('npCover').src = song.cover;
    document.getElementById('npTitle').textContent = song.title;
    document.getElementById('totalTime').textContent = song.duration;
    audio.play().catch(() => {});
    isPlaying = true;
    updatePlayButton();
    highlightActive();
}

function togglePlay() {
    if (currentIndex === -1) return playSong(0);
    if (audio.paused) {
        audio.play();
        isPlaying = true;
    } else {
        audio.pause();
        isPlaying = false;
    }
    updatePlayButton();
}

function updatePlayButton() {
    document.getElementById('playPause').innerHTML = isPlaying 
        ? '<i class="fas fa-pause text-4xl"></i>' 
        : '<i class="fas fa-play text-4xl ml-1"></i>';
}

audio.ontimeupdate = () => {
    if (!audio.duration) return;
    const pct = (audio.currentTime / audio.duration) * 100;
    document.getElementById('progress').style.width = pct + '%';
    document.getElementById('currentTime').textContent = formatTime(audio.currentTime);
};

function formatTime(s) {
    const m = Math.floor(s / 60);
    const sec = Math.floor(s % 60);
    return m + ':' + (sec < 10 ? '0' : '') + sec;
}

function seek(e) {
    const bar = e.currentTarget;
    const pct = e.offsetX / bar.offsetWidth;
    audio.currentTime = pct * audio.duration;
}

function nextSong() { 
    if (tracks.length === 0) return;
    currentIndex = (currentIndex + 1) % tracks.length; 
    playSong(currentIndex); 
}
function prevSong() { 
    if (tracks.length === 0) return;
    currentIndex = (currentIndex - 1 + tracks.length) % tracks.length; 
    playSong(currentIndex); 
}

function highlightActive() {
    document.querySelectorAll('#tracks tr').forEach(r => r.classList.remove('active-track'));
    const rows = document.querySelectorAll('#tracks tr');
    if (rows[currentIndex]) rows[currentIndex].classList.add('active-track');
}

function filterSongs() {
    const val = document.getElementById('searchInput').value.toLowerCase();
    document.querySelectorAll('#cards > div').forEach((c, i) => c.style.display = tracks[i].title.toLowerCase().includes(val) ? '' : 'none');
    document.querySelectorAll('#tracks tr').forEach((r, i) => r.style.display = tracks[i].title.toLowerCase().includes(val) ? '' : 'none');
}

function focusSearch() { document.getElementById('searchInput').focus(); }

document.getElementById('volume').oninput = e => audio.volume = e.target.value;

window.onload = init;
</script>
</body>
</html>
